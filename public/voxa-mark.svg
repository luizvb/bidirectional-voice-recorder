  <path d="M244 314 474 730c17 31 59 31 76 0l230-416" fill="none" stroke="url(#signal)" stroke-width="92" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M337 322 495 609c7 13 27 13 34 0l158-287" fill="none" stroke="#fff" stroke-opacity=".9" stroke-width="22" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="512" cy="744" r="17" fill="#9C6CFF"/>
